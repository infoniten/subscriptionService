spring:
  application:
    name: subscription-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/subscriptions}
    username: ${DB_USER:subscriptions}
    password: ${DB_PASSWORD:subscriptions}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          # Readiness must verify PostgreSQL (db) and Redis (requirement 20)
          include: readinessState,db,redis
        liveness:
          include: livenessState
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

# Structured (JSON) access + application logs are produced by the ecs/json encoder in prod;
# here we keep the pattern readable and rely on the platform to ship logs.
logging:
  level:
    com.example.subscription: INFO

springdoc:
  # Only the public API is documented; internal Engine endpoints (/internal/**) are excluded.
  paths-to-match: /api/v1/**
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

subscription:
  topic:
    prefix: subscription
  redis:
    channel: subscriptions:changes
    runtime-set-key: subs:runtime
    config-key-prefix: "sub:"
  initialization:
    base-url: ${INIT_SERVICE_URL:http://initialization-service}
  # All limits are externalized (ConfigMap / env) so they can be tuned without a code change.
  rate-limits:
    max-subscriptions-per-subscriber: 100
    max-topics-per-subscriber: 20
    max-subscription-creations-per-hour: 60
    max-initializations-per-hour: 20
    max-fields: 100
    max-filter-length: 4096
